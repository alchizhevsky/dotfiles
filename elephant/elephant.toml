auto_detect_launch_prefix = true
before_load = []
git_on_demand = true
ignored_providers = []
launch_prefix = ''
overload_local_env = false
terminal_cmd = ''

[provider_hosts]


[[providers]]
name = "desktopapplications"

[providers.desktopapplications]
enabled = true
# Standard Fedora paths
paths = [
    "/usr/share/applications",
    "/usr/local/share/applications",
    "~/.local/share/applications"
]

[[providers]]
name = "calc"

[providers.calc]
enabled = true
decimal_separator = "."
copy_to_clipboard = true
