general {
    lock_cmd = pidof hyprlock || hyprlock       # avoid starting multiple hyprlock instances
    before_sleep_cmd = loginctl lock-session    # lock before suspend
    after_sleep_cmd = hyprctl dispatch dpms on  # turn on display after wake
}

# Screen Dimming (2.5 mins)
listener {
    timeout = 150
    on-timeout = brightnessctl -s set 10         # set monitor backlight to minimum
    on-resume = brightnessctl -r                # restore monitor backlight
}

# Lock Screen (5 mins)
listener {
    timeout = 300
    on-timeout = loginctl lock-session
}

# Turn off Screen (5.5 mins)
listener {
    timeout = 330
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}

# Suspend (30 mins)
listener {
    timeout = 1800
    on-timeout = systemctl suspend
}
